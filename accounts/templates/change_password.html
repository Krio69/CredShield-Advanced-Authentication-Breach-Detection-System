<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Credentials Update | CredShield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input { width: 100%; padding: 0.75rem; border-radius: 0.5rem; background: #111; border: 1px solid #222; color: white; margin-bottom: 1rem; }
        label { color: #666; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md">
        <div class="glass p-8 rounded-3xl border-t-2 border-blue-500/30">
            <h2 class="text-2xl font-bold mb-6">Rotate Credentials</h2>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="w-full bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-500 transition-all">
                    Update & Rescan
                </button>
            </form>
            <div class="mt-4 text-center">
                <a href="{% url 'success' %}" class="text-gray-500 text-sm hover:text-white">Cancel</a>
            </div>
        </div>
    </div>
</body>
</html>
