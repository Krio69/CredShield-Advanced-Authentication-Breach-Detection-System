<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join CredShield | Secure Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        
        /* Custom styling for Django form fields */
        input { 
            width: 100%; padding: 0.75rem 1rem; border-radius: 0.75rem; 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; outline: none; transition: all 0.2s; margin-bottom: 1rem;
        }
        input:focus { border-color: #3b82f6; ring: 1px #3b82f6; }
        label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #9ca3af; margin-bottom: 0.5rem; }
        .helptext { font-size: 0.7rem; color: #6b7280; display: block; margin-top: -0.5rem; margin-bottom: 1rem; }
        ul.errorlist { color: #ef4444; font-size: 0.8rem; margin-bottom: 1rem; list-style: none; padding: 0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-900/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-900/20 rounded-full blur-[120px]"></div>
    </div>

    <div class="w-full max-w-lg">
        <div class="glass p-10 rounded-3xl shadow-2xl relative">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">Create Security Profile</h2>
                <p class="text-gray-400 mt-2 text-sm">Deploy your own instance of CredShield monitoring</p>
            </div>

            <form method="POST" id="regForm">
                {% csrf_token %}
                
                {{ form.as_p }}

                <button type="submit" id="regBtn" class="w-full btn-primary py-4 rounded-xl font-bold text-white uppercase tracking-widest text-sm mt-4 flex items-center justify-center gap-2">
                    <span id="btnText">Initialize Account</span>
                    <svg id="spinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-8 text-center border-t border-white/10 pt-6">
                <p class="text-gray-500 text-sm">Already protected? <a href="{% url 'login' %}" class="text-blue-400 font-semibold hover:underline">Sign In</a></p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('regForm');
        const btn = document.getElementById('regBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');

        form.addEventListener('submit', () => {
            btn.disabled = true;
            btnText.innerText = 'Analyzing Entropy...';
            spinner.classList.remove('hidden');
        });
    </script>
</body>
</html>
